name: doctor
description: "Doctor Game"
publish_to: 'none'
version: 1.0.5+6

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  
  # Navigation
  go_router: ^14.6.2
  
  # Data Serialization
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1
  
  # UI & Icons
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  
  # Localization
  easy_localization: ^3.0.7

  # Web PWA Support
  web: ^1.1.0
  flutter_web_plugins:
    sdk: flutter
  
  # Image handling
  cached_network_image: ^3.4.1
  audioplayers: ^6.5.1
  uuid: ^4.5.2
  animated_text_kit: ^4.3.0
  
  # Firebase
  firebase_core: ^3.8.1
  firebase_crashlytics: ^4.3.2
  firebase_messaging: ^15.2.4

  # Local Notifications
  flutter_local_notifications: ^18.0.1

  # Sharing
  share_plus: ^10.1.4

  # Auth & Network
  google_sign_in: ^6.2.2
  sign_in_with_apple: ^6.1.4
  crypto: ^3.0.6
  dio: ^5.7.0
  flutter_secure_storage: ^9.2.4
  fpdart: ^1.1.0
  google_sign_in_web: ^0.12.4+4
  url_launcher: ^6.2.5
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  mocktail: ^1.0.4

  # Code Generation
  build_runner: ^2.4.8
  freezed: ^2.4.6
  json_serializable: ^6.7.1
  riverpod_generator: ^2.3.9

  # App Icon Generation
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  remove_alpha_ios: true
  image_path: "assets/icon/icon.png"
  adaptive_icon_background: "#0A1628"
  adaptive_icon_foreground: "assets/icon/icon_foreground.png"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/icon/icon.png"
    background_color: "#0A1628"
    theme_color: "#00BFA5"
  windows:
    generate: false
  macos:
    generate: false

flutter:
  uses-material-design: true
  
  assets:
    - assets/translations/
    - assets/data/
    - assets/data/cases/
    - assets/images/
    - assets/images/cases/
    - assets/images/case_003/
    - assets/images/case_004/
    - assets/images/suspects/
    - assets/images/evidences/
    - assets/audio/

