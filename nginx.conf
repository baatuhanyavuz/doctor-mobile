# ================================
# Dedektif: Suç Dosyaları - nginx PWA Configuration
# ================================
# Optimized for Flutter Web PWA with service worker support

server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression for better performance
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types
        text/plain
        text/css
        text/javascript
        text/xml
        application/javascript
        application/json
        application/xml
        application/wasm
        font/woff
        font/woff2
        image/svg+xml;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Service Worker - Must not be cached
    location = /flutter_service_worker.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        try_files $uri =404;
    }

    # Manifest - Short cache for updates
    location = /manifest.json {
        add_header Cache-Control "max-age=3600";
        try_files $uri =404;
    }

    # Version file - No cache for update detection
    location = /version.json {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }

    # Flutter bootstrap - Short cache
    location = /flutter_bootstrap.js {
        add_header Cache-Control "max-age=3600";
        try_files $uri =404;
    }

    # Static assets - Long cache (1 year)
    # These files have hashed names, so they can be cached forever
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|wasm)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # JSON data files (cases, manifest)
    location ~* \.json$ {
        add_header Cache-Control "public, max-age=86400";
        try_files $uri =404;
    }

    # Audio files - Long cache
    location ~* \.(mp3|ogg|wav|aac)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Canvaskit WASM files
    location /canvaskit/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # SPA routing - All routes go to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Health check endpoint
    location = /health {
        access_log off;
        return 200 "OK";
        add_header Content-Type text/plain;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Error pages
    error_page 404 /index.html;
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
