<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A1628"/>
      <stop offset="100%" stop-color="#132038"/>
    </linearGradient>
    <linearGradient id="cross" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00BFA5"/>
      <stop offset="100%" stop-color="#00897B"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00BFA5" stop-opacity="0.4"/>
      <stop offset="60%" stop-color="#00BFA5" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#00BFA5" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="8" stdDeviation="20" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background square with rounded corners -->
  <rect x="0" y="0" width="1024" height="1024" fill="url(#bg)"/>

  <!-- Soft glow circle -->
  <circle cx="512" cy="512" r="450" fill="url(#glow)"/>

  <!-- Outer ring (decoration) -->
  <circle cx="512" cy="512" r="380" fill="none" stroke="#00BFA5" stroke-width="6" stroke-opacity="0.3"/>
  <circle cx="512" cy="512" r="350" fill="none" stroke="#00BFA5" stroke-width="2" stroke-opacity="0.5"/>

  <!-- Medical cross shape (centered) -->
  <g filter="url(#shadow)">
    <!-- Vertical bar -->
    <rect x="432" y="232" width="160" height="560" rx="20" ry="20" fill="url(#cross)"/>
    <!-- Horizontal bar -->
    <rect x="232" y="432" width="560" height="160" rx="20" ry="20" fill="url(#cross)"/>
  </g>

  <!-- Inner highlight on cross -->
  <rect x="432" y="232" width="160" height="560" rx="20" ry="20" fill="none" stroke="#FFFFFF" stroke-width="3" stroke-opacity="0.2"/>
  <rect x="232" y="432" width="560" height="160" rx="20" ry="20" fill="none" stroke="#FFFFFF" stroke-width="3" stroke-opacity="0.2"/>

  <!-- Heartbeat line accent (inside horizontal bar) -->
  <g opacity="0.7">
    <polyline points="270,512 340,512 360,470 380,560 400,460 420,540 440,512 510,512"
              fill="none" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <polyline points="510,512 580,512 600,470 620,560 640,460 660,540 680,512 750,512"
              fill="none" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Corner accent dots -->
  <circle cx="180" cy="180" r="8" fill="#FFB74D" opacity="0.6"/>
  <circle cx="844" cy="180" r="8" fill="#FFB74D" opacity="0.6"/>
  <circle cx="180" cy="844" r="8" fill="#FFB74D" opacity="0.6"/>
  <circle cx="844" cy="844" r="8" fill="#FFB74D" opacity="0.6"/>
</svg>
